name: Security & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detect secrets in code
      - name: Run Secret Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ''
          head: HEAD
          extra_args: --debug --verification-timeout=5s

      # Check for hardcoded credentials
      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          
          # Look for common secret patterns
          if grep -r "PRIVATE_KEY\|API_KEY\|SECRET_KEY\|TOKEN" --include="*.js" --include="*.json" . \
             | grep -v "node_modules" \
             | grep -v ".env.example" \
             | grep -v "\.git"; then
            echo "❌ Potential secrets found in source code!"
            exit 1
          fi
          
          echo "✅ No obvious hardcoded secrets detected"

      # Verify .env.local not committed
      - name: Verify no environment files committed
        run: |
          echo "Checking for committed environment files..."
          
          if git ls-files | grep -E "\.env\.|\.env$|config\.production\.js|credentials\.json"; then
            echo "❌ Environment or credential files are tracked in Git!"
            exit 1
          fi
          
          echo "✅ No environment files in Git"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      # Optional: Run ESLint if configured
      - name: Run ESLint
        run: npm run lint --if-present || echo "⏭️  Lint not configured"
      
      # Optional: Run tests
      - name: Run tests
        run: npm test --if-present || echo "⏭️  Tests not configured"

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Audit npm packages
        run: npm audit --audit-level=moderate || true
        
      - name: Check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  gitignore-check:
    name: Verify .gitignore coverage
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check critical files ignored
        run: |
          echo "Verifying .gitignore coverage..."
          
          required_ignores=(".env" ".env.local" "node_modules/" ".next/" "dist/")
          
          for pattern in "${required_ignores[@]}"; do
            if grep -q "^${pattern}" .gitignore; then
              echo "✅ $pattern is ignored"
            else
              echo "❌ $pattern is NOT ignored!"
              exit 1
            fi
          done
